<html>
    <head>
        <title>google</title>
        <style>
            .circlevio{
    
    background-color: #00f314;
    cursor: pointer;
    border-radius: 64px;
    width: 80px;
    height: 80px;
    border-style: none
    margin 25px;
          background-image: linear-gradient( 135deg, #FAB2FF 10%, #1904E5 100%);
          color: white;
          padding: 20px;
          width: 200px;
          text-align: center;
          border: none;
          text-decoration: none;
          display: inline-block;
          cursor: pointer;
          background-size: 200%;
          transition: 0.6s;
          outline: none;
    }
    .circlebaidu{

background-color: #00f314;
cursor: pointer;
border-radius: 64px;
width: 80px;
height: 80px;
border-style: none
margin 25px;
      background-image: linear-gradient( 135deg, #05b5f5 10%, #1904E5 100%);
      color: white;
      padding: 20px;
      width: 200px;
      text-align: center;
      border: none;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
      background-size: 200%;
      transition: 0.6s;
      outline: none;
}
        </style>
    </head>
    <body background="素材/墨水画背景图.png"
    style="background-repeat:no-repeat
    background-attachment：fixed;
    background-size:100% 100%;">
        <button onclick='location.href="科技.html"' class="circlevio" style="padding:10px ">返回</button>
        <button onclick='location.href="https://www.google.cn/chrome/"' class="circlebaidu" style="padding: 10px">google chrome网络浏览器</button>
        <button onclick='location.href="https://translate.google.cn/"' class="circlebaidu" style="padding: 10px">google翻译（只是一个空壳，国内地区点击网址后会无响应）</button>
        <button onclick='location.href="https://developer.android.google.cn/?hl=zh-cn"' class="circlebaidu" style="padding: 10px">android开发者</button>
        <button onclick='location.href="https://golang.google.cn/"' class="circlebaidu" style="padding: 10px">Go编程语言</button>
        <button onclick='location.href="https://developers.google.cn/?hl=zh-cn"' class="circlebaidu" style="padding: 10px">google for developers</button>
        <button onclick='location.href="http://www.google.cn/"' class="circlebaidu" style="padding: 10px">google搜索（也是一个空壳,国内地区点击网址后会无响应）</button>
    </body>
</html>
